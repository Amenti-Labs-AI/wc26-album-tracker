name: panini_wc26_tracker
description: WC26 Album Tracker — Panini FIFA World Cup 2026 sticker collection with on-device page scan.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  cupertino_icons: ^1.0.8
  file_picker: ^8.3.7
  flutter_riverpod: ^2.6.1
  google_mlkit_text_recognition: ^0.14.0
  image: ^4.5.4
  path: ^1.9.1
  path_provider: ^2.1.5
  # Pin below 2.6: objective_c native hook fails under Xcode's stripped PATH on Intel Macs.
  path_provider_foundation: 2.4.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  sqflite: ^2.4.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#021A14"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/catalog/wc26_catalog.json
    - assets/page_templates/
    - assets/test_fixtures/
    - assets/branding/amenti_logo_mark.png
